<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCore — Pharmacy ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@600&display=swap" rel="stylesheet">

<style>
/* --- THE $10,000 DESIGN SYSTEM --- */
:root {
  /* High-End Palette (Slate & Emerald) */
  --teal-900: #0f172a;    /* Deep Navy Sidebar */
  --teal-800: #1e293b;    /* Sidebar Hover */
  --teal-700: #10b981;    /* Primary Accent (Emerald) */
  --teal-600: #059669; 
  --teal-100: #f1f5f9;
  --teal-50: #f8fafc;
  
  --amber-500: #10b981;   /* Replaced amber with emerald for modern look */
  --amber-100: #dcfce7;
  
  --paper: #f8fafc;       /* Soft background */
  --white: #ffffff;
  --ink: #0f172a;         /* High contrast text */
  --ink-soft: #64748b;    /* Subtext */
  --line: #e2e8f0;        /* Subtle borders */
  
  --font-sans: 'Inter', sans-serif;
  --font-serif: 'Source Serif 4', serif;
  
  /* The Secret Sauce: Large Radii & Soft Shadows */
  --radius: 24px;
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
  --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

#app { display: flex; min-height: 100vh; }

/* --- SIDEBAR UPGRADE --- */
.sidebar {
  width: 260px; background: var(--teal-900); color: #fff;
  display: flex; flex-direction: column; position: sticky; top: 0; h-screen;
  border-right: 1px solid rgba(255,255,255,0.05);
}
.brand { padding: 32px 24px; border: none; }
.brand-mark {
  background: var(--teal-700) !important; color: white !important;
  width: 40px; height: 40px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
}
.brand-name { font-family: var(--font-serif); font-size: 22px; }

.nav-item {
  margin: 4px 12px; padding: 12px 16px; border-radius: 14px;
  transition: all 0.2s ease; opacity: 0.7;
}
.nav-item:hover { background: rgba(255,255,255,0.05); opacity: 1; transform: translateX(4px); }
.nav-item.active { background: var(--teal-700) !important; color: white !important; opacity: 1; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }

/* --- MAIN CONTENT UPGRADE --- */
.topbar {
  padding: 24px 40px; background: rgba(248, 250, 252, 0.8);
  backdrop-filter: blur(12px); border-bottom: 1px solid var(--line);
}
.page-title { font-family: var(--font-serif); font-size: 32px; letter-spacing: -0.5px; }

.btn {
  border-radius: 12px; padding: 10px 20px; font-weight: 600;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid var(--line); box-shadow: var(--shadow);
}
.btn-primary { background: var(--teal-700); border: none; box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39); }
.btn-primary:hover { background: var(--teal-600); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.23); }

/* --- THE "BENTO" CARDS --- */
.metric-card, .card, .branch-card {
  background: var(--white); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 24px;
  box-shadow: var(--shadow); transition: all 0.3s ease;
}
.metric-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: var(--teal-700); }
.metric-value { font-size: 32px; font-weight: 700; letter-spacing: -1px; }

/* --- PREMIUM TABLES --- */
table { border-spacing: 0 8px; border-collapse: separate; }
thead th { padding: 12px; font-weight: 700; color: var(--ink-soft); text-transform: none; letter-spacing: 0; }
tbody tr { background: white; border-radius: 16px; transition: transform 0.2s; }
tbody td { 
    padding: 16px; border: none; 
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); 
}
tbody td:first-child { border-left: 1px solid var(--line); border-top-left-radius: 16px; border-bottom-left-radius: 16px; }
tbody td:last-child { border-right: 1px solid var(--line); border-top-right-radius: 16px; border-bottom-right-radius: 16px; }
tbody tr:hover { transform: scale(1.01); background: #fff; box-shadow: var(--shadow); }

/* --- POS & MODALS --- */
.pos-card { border-radius: 20px; border: 1px solid var(--line); transition: all 0.2s; }
.pos-card:hover { border-color: var(--teal-700); background: var(--teal-50); }
.modal { border-radius: 32px; padding: 40px; box-shadow: var(--shadow-lg); }

/* Hide messy scrollbars */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
