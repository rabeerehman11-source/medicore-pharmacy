<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCore — Pharmacy ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Core neutrals — cool slate scale, Linear/Stripe territory */
  --ink:#0E1116; --ink-soft:#5B6472; --ink-faint:#94A0AF;
  --paper:#F8F9FC; --paper-dim:#F0F2F7; --white:#FFFFFF;
  --line:#E4E7EC; --line-strong:#D2D7E0;

  /* Brand — single confident indigo accent */
  --teal-900:#1E1B4B; --teal-800:#3730A3; --teal-700:#4338CA; --teal-600:#4F46E5; --teal-100:#E0E1FA; --teal-50:#F2F1FE;

  /* Status — desaturated, used sparingly */
  --amber-800:#7A4A0A; --amber-600:#B45309; --amber-500:#D97706; --amber-100:#FEF0DA; --amber-50:#FFFAF0;
  --red-700:#9F1239; --red-500:#E11D48; --red-100:#FCE4E9;

  /* Type */
  --font-sans:'Inter', -apple-system, sans-serif;
  --font-mono:'IBM Plex Mono', monospace;

  /* Geometry — 8px grid */
  --radius-sm:6px; --radius:10px; --radius-lg:14px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-8:48px;

  /* Elevation — soft, layered, never harsh */
  --shadow-xs:0 1px 2px rgba(14,17,22,0.04);
  --shadow-sm:0 1px 3px rgba(14,17,22,0.06), 0 1px 2px rgba(14,17,22,0.04);
  --shadow-md:0 4px 12px rgba(14,17,22,0.07), 0 1px 3px rgba(14,17,22,0.04);
  --shadow-lg:0 12px 32px rgba(14,17,22,0.10), 0 2px 8px rgba(14,17,22,0.05);
  --shadow-focus:0 0 0 3px rgba(79,70,229,0.16);

  --ease:cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box; margin:0; padding:0;}
html, body{width:100%; min-height:100%;}
body{
  font-family:var(--font-sans);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  font-size:14px;
  letter-spacing:-0.006em;
}
#app{display:flex; min-height:100vh; width:100%;}
:focus-visible{outline:none; box-shadow:var(--shadow-focus); border-radius:var(--radius-sm);}
@media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }

/* ---------- Sidebar ---------- */
.sidebar{
  width:248px; background:var(--teal-900); color:#C7C9F4;
  display:flex; flex-direction:column; flex-shrink:0; position:sticky; top:0; height:100vh;
}
.brand{padding:var(--sp-6) var(--sp-5) var(--sp-4); border-bottom:1px solid rgba(255,255,255,0.08);}
.brand-mark{
  width:32px; height:32px; border-radius:var(--radius-sm); background:var(--teal-600);
  display:flex; align-items:center; justify-content:center; margin-bottom:var(--sp-3);
  font-family:var(--font-sans); font-weight:700; font-size:15px; color:#fff;
  box-shadow:var(--shadow-sm);
}
.brand-name{font-size:16px; font-weight:700; color:#fff; letter-spacing:-0.01em;}
.brand-sub{font-size:11px; color:#C7C9F4; opacity:0.55; margin-top:2px; letter-spacing:0.3px;}

.branch-picker{padding:var(--sp-3) var(--sp-4); border-bottom:1px solid rgba(255,255,255,0.08);}
.branch-label{font-size:10px; text-transform:uppercase; letter-spacing:0.5px; opacity:0.5; margin-bottom:var(--sp-2); font-weight:600;}
.branch-select{
  width:100%; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
  color:#fff; padding:8px 10px; border-radius:var(--radius-sm); font-size:13px; font-family:var(--font-sans);
  cursor:pointer; transition:background 0.15s var(--ease);
}
.branch-select:hover{background:rgba(255,255,255,0.1);}
.branch-select option{color:#0E1116;}

.nav{flex:1; padding:var(--sp-2); overflow-y:auto;}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-sm);
  color:#C7C9F4; opacity:0.72; cursor:pointer; font-size:13.5px; font-weight:500; margin-bottom:1px;
  transition:background 0.13s var(--ease), opacity 0.13s var(--ease);
}
.nav-item:hover{background:rgba(255,255,255,0.06); opacity:1;}
.nav-item.active{background:rgba(255,255,255,0.12); opacity:1; color:#fff; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);}
.nav-item i{font-size:17px; width:17px; text-align:center; opacity:0.9;}
.nav-section-label{font-size:10px; text-transform:uppercase; letter-spacing:0.5px; opacity:0.4; padding:14px 10px 6px; font-weight:600;}

.sidebar-foot{padding:var(--sp-4); border-top:1px solid rgba(255,255,255,0.08); font-size:11.5px; opacity:0.5;}

/* ---------- Main ---------- */
.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px var(--sp-6); border-bottom:1px solid var(--line);
  background:rgba(248,249,252,0.85); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  position:sticky; top:0; z-index:5;
}
.page-title{font-size:19px; font-weight:700; letter-spacing:-0.015em; color:var(--ink);}
.page-sub{font-size:12.5px; color:var(--ink-soft); margin-top:1px;}
.topbar-actions{display:flex; gap:var(--sp-2); align-items:center;}

.btn{
  font-family:var(--font-sans); font-size:13.5px; font-weight:500; padding:9px 16px;
  border-radius:var(--radius-sm); border:1px solid var(--line-strong); background:var(--white);
  color:var(--ink); cursor:pointer; display:inline-flex; align-items:center; gap:7px;
  box-shadow:var(--shadow-xs);
  transition:background 0.15s var(--ease), border-color 0.15s var(--ease), transform 0.1s var(--ease), box-shadow 0.15s var(--ease);
}
.btn:hover{background:var(--paper-dim); border-color:var(--ink-faint); box-shadow:var(--shadow-sm);}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--teal-600); color:#fff; border-color:var(--teal-600); box-shadow:var(--shadow-sm);}
.btn-primary:hover{background:var(--teal-700); border-color:var(--teal-700); box-shadow:var(--shadow-md);}
.btn-sm{padding:6px 11px; font-size:12.5px;}

.content{padding:var(--sp-6) var(--sp-6) 60px; flex:1;}

/* ---------- Cards & grids ---------- */
.metric-row{display:grid; grid-template-columns:repeat(4,1fr); gap:var(--sp-4); margin-bottom:var(--sp-5);}
.metric-card{
  background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
  padding:var(--sp-4) var(--sp-5); box-shadow:var(--shadow-xs); position:relative; overflow:hidden;
  transition:box-shadow 0.18s var(--ease), transform 0.18s var(--ease);
}
.metric-card::before{
  content:""; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--teal-600), var(--teal-100)); opacity:0.9;
}
.metric-card:hover{box-shadow:var(--shadow-md); transform:translateY(-1px);}
.metric-label{font-size:12px; color:var(--ink-soft); margin-bottom:var(--sp-2); display:flex; align-items:center; gap:6px; font-weight:500;}
.metric-value{font-family:var(--font-mono); font-size:25px; font-weight:600; color:var(--ink); letter-spacing:-0.01em;}
.metric-delta{font-size:12px; margin-top:var(--sp-2); font-family:var(--font-mono);}
.metric-delta.up{color:var(--teal-700);}
.metric-delta.down{color:var(--red-500);}

.section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:var(--sp-3);}
.section-title{font-size:15.5px; font-weight:700; letter-spacing:-0.01em;}
.section-link{font-size:13px; color:var(--teal-600); cursor:pointer; font-weight:500; transition:color 0.15s var(--ease);}
.section-link:hover{color:var(--teal-700);}

.card{background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:var(--sp-5); box-shadow:var(--shadow-xs);}

.branch-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:var(--sp-4); margin-bottom:var(--sp-6);}
.branch-card{
  background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
  padding:var(--sp-4) var(--sp-5); cursor:pointer; box-shadow:var(--shadow-xs);
  transition:border-color 0.18s var(--ease), transform 0.18s var(--ease), box-shadow 0.18s var(--ease);
}
.branch-card:hover{border-color:var(--teal-600); transform:translateY(-2px); box-shadow:var(--shadow-md);}
.branch-card-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:var(--sp-3);}
.branch-card-name{font-size:15.5px; font-weight:700; letter-spacing:-0.01em;}
.branch-card-loc{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.status-pill{
  font-size:10.5px; padding:3px 9px; border-radius:20px; font-weight:600;
  text-transform:uppercase; letter-spacing:0.3px;
}
.status-good{background:var(--teal-50); color:var(--teal-800);}
.status-warn{background:var(--amber-50); color:var(--amber-800);}
.status-bad{background:var(--red-100); color:var(--red-700);}

.pulse-bar{display:flex; gap:2px; height:26px; align-items:flex-end; margin:var(--sp-3) 0;}
.pulse-seg{flex:1; border-radius:2px 2px 0 0; background:var(--teal-100); transition:background 0.15s var(--ease);}
.branch-stats{display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); font-family:var(--font-mono);}

/* ---------- Tables ---------- */
table{width:100%; border-collapse:collapse; font-size:13.5px;}
thead th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.4px;
  color:var(--ink-faint); padding:0 var(--sp-3) var(--sp-3); border-bottom:1px solid var(--line); font-weight:600;
}
tbody td{padding:13px var(--sp-3); border-bottom:1px solid var(--line); vertical-align:middle;}
tbody tr{transition:background 0.12s var(--ease);}
tbody tr:hover{background:var(--paper-dim);}
tbody tr:last-child td{border-bottom:none;}
.mono{font-family:var(--font-mono); font-size:13px;}
.tname{font-weight:600;}
.tsub{font-size:12px; color:var(--ink-soft); margin-top:2px;}

.tag{font-size:11px; padding:3px 8px; border-radius:6px; font-weight:600; display:inline-flex; align-items:center; gap:4px;}
.tag-ok{background:var(--teal-50); color:var(--teal-800);}
.tag-low{background:var(--amber-50); color:var(--amber-800);}
.tag-out{background:var(--red-100); color:var(--red-700);}
.tag-exp{background:var(--red-100); color:var(--red-700);}

.avatar{
  width:32px; height:32px; border-radius:50%; background:var(--teal-100); color:var(--teal-800);
  display:inline-flex; align-items:center; justify-content:center; font-size:12.5px; font-weight:700;
  margin-right:var(--sp-3); flex-shrink:0;
}
.person-cell{display:flex; align-items:center;}

.toolbar{display:flex; gap:var(--sp-3); margin-bottom:var(--sp-4); align-items:center;}
.search-input{
  flex:1; max-width:320px; padding:9px 14px; border:1px solid var(--line-strong); border-radius:var(--radius-sm);
  font-size:13.5px; font-family:var(--font-sans); background:var(--white); box-shadow:var(--shadow-xs);
  transition:border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
}
.search-input:focus{outline:none; border-color:var(--teal-600); box-shadow:var(--shadow-focus);}
.filter-chip{
  padding:7px 13px; border:1px solid var(--line-strong); border-radius:20px; font-size:12.5px;
  background:var(--white); cursor:pointer; color:var(--ink-soft); font-weight:500;
  transition:all 0.15s var(--ease);
}
.filter-chip:hover{border-color:var(--ink-faint);}
.filter-chip.active{background:var(--teal-600); color:#fff; border-color:var(--teal-600); box-shadow:var(--shadow-sm);}

/* ---------- AI Assistant ---------- */
.ai-shell{display:flex; flex-direction:column; height:calc(100vh - 150px); max-width:760px;}
.ai-msgs{flex:1; overflow-y:auto; padding:4px 0 20px; display:flex; flex-direction:column; gap:var(--sp-4);}
.ai-msg{display:flex; gap:var(--sp-3); max-width:88%;}
.ai-msg.user{align-self:flex-end; flex-direction:row-reverse;}
.ai-bubble{padding:12px 16px; border-radius:var(--radius); font-size:14px; line-height:1.55;}
.ai-msg.assistant .ai-bubble{background:var(--white); border:1px solid var(--line); box-shadow:var(--shadow-xs);}
.ai-msg.user .ai-bubble{background:var(--teal-600); color:#fff; box-shadow:var(--shadow-sm);}
.ai-icon{
  width:30px; height:30px; border-radius:var(--radius-sm); background:var(--amber-500); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; color:var(--teal-900); font-size:15px;
  box-shadow:var(--shadow-sm);
}
.ai-suggestions{display:flex; flex-wrap:wrap; gap:var(--sp-2); margin-top:var(--sp-4);}
.ai-chip{
  padding:8px 14px; border:1px solid var(--line-strong); border-radius:20px; font-size:12.5px;
  background:var(--white); cursor:pointer; transition:all 0.15s var(--ease);
}
.ai-chip:hover{border-color:var(--teal-600); color:var(--teal-700); box-shadow:var(--shadow-xs); transform:translateY(-1px);}
.ai-inputbar{display:flex; gap:var(--sp-3); padding-top:var(--sp-4); border-top:1px solid var(--line);}
.ai-input{flex:1; padding:12px 16px; border:1px solid var(--line-strong); border-radius:var(--radius); font-size:14px; transition:border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);}
.ai-input:focus{outline:none; border-color:var(--teal-600); box-shadow:var(--shadow-focus);}
.ai-mini-table{margin-top:var(--sp-3); border:1px solid var(--line); border-radius:var(--radius-sm); overflow:hidden;}
.ai-mini-table table{font-size:12.5px;}
.ai-mini-table thead th{padding:8px 10px; background:var(--paper-dim);}
.ai-mini-table tbody td{padding:8px 10px;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(14,17,22,0.5); display:none;
  align-items:center; justify-content:center; z-index:50; backdrop-filter:blur(2px);
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--white); border-radius:var(--radius-lg); padding:28px 30px; width:440px; max-width:90vw;
  max-height:85vh; overflow-y:auto; box-shadow:var(--shadow-lg);
}
.modal-title{font-size:18px; font-weight:700; margin-bottom:var(--sp-5); letter-spacing:-0.01em;}
.field{margin-bottom:var(--sp-4);}
.field label{display:block; font-size:12.5px; color:var(--ink-soft); margin-bottom:var(--sp-2); font-weight:500;}
.field input, .field select{
  width:100%; padding:9px 12px; border:1px solid var(--line-strong); border-radius:var(--radius-sm);
  font-size:13.5px; font-family:var(--font-sans); transition:border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
}
.field input:focus, .field select:focus{outline:none; border-color:var(--teal-600); box-shadow:var(--shadow-focus);}
.modal-actions{display:flex; justify-content:flex-end; gap:var(--sp-3); margin-top:var(--sp-5);}

.empty-state{text-align:center; padding:50px 20px; color:var(--ink-soft);}
.empty-state i{font-size:32px; opacity:0.4; margin-bottom:var(--sp-3); display:block;}

.toast{
  position:fixed; bottom:24px; right:24px; background:var(--teal-900); color:#fff;
  padding:13px 20px; border-radius:var(--radius); font-size:13.5px; display:flex; align-items:center; gap:10px;
  opacity:0; transform:translateY(10px); transition:opacity 0.2s var(--ease), transform 0.2s var(--ease);
  z-index:100; box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1; transform:translateY(0);}

.badge-count{
  background:var(--amber-500); color:var(--teal-900); font-size:10.5px; font-weight:700;
  border-radius:10px; padding:1px 7px; margin-left:auto;
}

/* ---------- Landing / Login ---------- */
.gate{min-height:100vh; display:flex; flex-direction:column; background:var(--paper);}
.gate-nav{
  display:flex; align-items:center; justify-content:space-between;
  padding:22px var(--sp-8); max-width:1100px; width:100%; margin:0 auto;
}
.gate-brand{display:flex; align-items:center; gap:10px;}
.gate-brand-mark{
  width:32px; height:32px; border-radius:var(--radius-sm); background:var(--teal-600);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-sans);
  font-weight:700; font-size:15px; color:#fff; box-shadow:var(--shadow-sm);
}
.gate-brand-name{font-size:18px; font-weight:700; letter-spacing:-0.01em;}
.gate-hero{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:40px 24px 80px; max-width:680px; margin:0 auto;
}
.gate-eyebrow{
  font-size:12px; letter-spacing:0.6px; text-transform:uppercase; color:var(--teal-600);
  font-weight:600; margin-bottom:var(--sp-5); display:flex; align-items:center; gap:7px;
}
.gate-headline{
  font-size:44px; font-weight:800; line-height:1.14;
  margin-bottom:var(--sp-5); letter-spacing:-0.025em;
}
.gate-sub{font-size:16.5px; color:var(--ink-soft); line-height:1.6; max-width:520px; margin-bottom:var(--sp-6);}
.gate-cta-row{display:flex; gap:var(--sp-3); margin-bottom:56px;}
.btn-lg{padding:13px 26px; font-size:14.5px; border-radius:var(--radius-sm);}
.gate-features{display:flex; gap:36px; flex-wrap:wrap; justify-content:center;}
.gate-feature{display:flex; align-items:center; gap:8px; font-size:13.5px; color:var(--ink-soft); font-weight:500;}
.gate-feature i{color:var(--teal-600); font-size:17px;}
.gate-foot{text-align:center; padding:20px; font-size:12px; color:var(--ink-faint); border-top:1px solid var(--line);}

.login-shell{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:var(--paper); padding:24px;
}
.login-card{
  width:380px; background:var(--white); border:1px solid var(--line); border-radius:var(--radius-lg);
  padding:36px 32px; box-shadow:var(--shadow-lg);
}
.login-brand{display:flex; align-items:center; gap:10px; margin-bottom:var(--sp-6);}
.login-title{font-size:21px; font-weight:700; margin-bottom:4px; letter-spacing:-0.01em;}
.login-sub{font-size:13.5px; color:var(--ink-soft); margin-bottom:var(--sp-5);}
.login-field{margin-bottom:var(--sp-4);}
.login-field label{display:block; font-size:12.5px; color:var(--ink-soft); margin-bottom:6px; font-weight:500;}
.login-field input{
  width:100%; padding:10px 13px; border:1px solid var(--line-strong); border-radius:var(--radius-sm);
  font-size:14px; font-family:var(--font-sans); transition:border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
}
.login-field input:focus{outline:none; border-color:var(--teal-600); box-shadow:var(--shadow-focus);}
.login-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--sp-5); font-size:12.5px;}
.login-row a{color:var(--teal-600); text-decoration:none; font-weight:500;}
.login-note{
  text-align:center; font-size:12px; color:var(--ink-faint); margin-top:var(--sp-5);
  padding-top:var(--sp-4); border-top:1px solid var(--line);
}
.login-back{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--ink-soft); cursor:pointer; margin-bottom:var(--sp-5); font-weight:500; transition:color 0.15s var(--ease);}
.login-back:hover{color:var(--ink);}

/* ---------- POS ---------- */
.pos-shell{display:grid; grid-template-columns:1fr 380px; gap:var(--sp-5); height:calc(100vh - 150px);}
.pos-search-bar{display:flex; gap:var(--sp-3); margin-bottom:var(--sp-4);}
.pos-search-input{flex:1; padding:12px 16px; border:1px solid var(--line-strong); border-radius:var(--radius); font-size:15px; box-shadow:var(--shadow-xs); transition:border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);}
.pos-search-input:focus{outline:none; border-color:var(--teal-600); box-shadow:var(--shadow-focus);}
.pos-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:var(--sp-3); overflow-y:auto; flex:1; padding-right:4px;}
.pos-card{
  background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:13px 14px;
  cursor:pointer; box-shadow:var(--shadow-xs);
  transition:border-color 0.15s var(--ease), transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
}
.pos-card:hover{border-color:var(--teal-600); transform:translateY(-2px); box-shadow:var(--shadow-md);}
.pos-card.out-of-stock{opacity:0.45; cursor:not-allowed;}
.pos-card.out-of-stock:hover{transform:none; border-color:var(--line); box-shadow:var(--shadow-xs);}
.pos-card-name{font-weight:600; font-size:13.5px; margin-bottom:4px; line-height:1.3;}
.pos-card-meta{font-size:11.5px; color:var(--ink-soft); margin-bottom:var(--sp-2);}
.pos-card-price{font-family:var(--font-mono); font-weight:700; font-size:14px; color:var(--teal-700);}
.pos-card-stock{font-size:10.5px; color:var(--ink-faint); margin-top:3px;}

.pos-cart-panel{background:var(--white); border:1px solid var(--line); border-radius:var(--radius); display:flex; flex-direction:column; padding:var(--sp-5); box-shadow:var(--shadow-sm);}
.pos-cart-head{font-size:16.5px; font-weight:700; margin-bottom:4px; letter-spacing:-0.01em;}
.pos-cart-sub{font-size:12px; color:var(--ink-soft); margin-bottom:var(--sp-4);}
.pos-cart-items{flex:1; overflow-y:auto; margin-bottom:var(--sp-4);}
.pos-cart-empty{text-align:center; padding:40px 10px; color:var(--ink-faint); font-size:13px;}
.pos-cart-row{display:flex; align-items:center; gap:8px; padding:10px 0; border-bottom:1px solid var(--line);}
.pos-cart-row-name{flex:1; font-size:13px; font-weight:600;}
.pos-cart-row-sub{font-size:11px; color:var(--ink-soft); margin-top:1px;}
.pos-qty-control{display:flex; align-items:center; gap:6px;}
.pos-qty-btn{
  width:22px; height:22px; border-radius:5px; border:1px solid var(--line-strong); background:var(--white);
  cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--ink-soft);
  transition:background 0.15s var(--ease), border-color 0.15s var(--ease);
}
.pos-qty-btn:hover{background:var(--paper-dim); border-color:var(--ink-faint);}
.pos-qty-val{font-family:var(--font-mono); font-size:13px; min-width:22px; text-align:center;}
.pos-cart-row-total{font-family:var(--font-mono); font-size:13px; font-weight:700; min-width:70px; text-align:right;}
.pos-remove-btn{color:var(--ink-faint); cursor:pointer; font-size:15px; padding:2px; transition:color 0.15s var(--ease);}
.pos-remove-btn:hover{color:var(--red-500);}
.pos-totals{border-top:1px solid var(--line); padding-top:var(--sp-4);}
.pos-total-row{display:flex; justify-content:space-between; font-size:13px; margin-bottom:var(--sp-2); color:var(--ink-soft);}
.pos-total-row.grand{font-size:18px; font-weight:700; color:var(--ink); font-family:var(--font-mono); margin-top:4px;}
.pos-customer-input{width:100%; padding:9px 12px; border:1px solid var(--line-strong); border-radius:var(--radius-sm); font-size:13px; margin-bottom:var(--sp-3); transition:border-color 0.15s var(--ease);}
.pos-customer-input:focus{outline:none; border-color:var(--teal-600); box-shadow:var(--shadow-focus);}

.receipt-wrap{font-family:var(--font-mono); font-size:12.5px; max-width:320px; margin:0 auto;}
.receipt-head{text-align:center; margin-bottom:var(--sp-4);}
.receipt-head .brand{font-size:18px; font-weight:700;}
.receipt-line{display:flex; justify-content:space-between; margin-bottom:3px;}
.receipt-divider{border-top:1px dashed var(--line-strong); margin:10px 0;}
.receipt-item-row{display:flex; justify-content:space-between; margin-bottom:2px;}
.receipt-total{font-weight:700; font-size:14px; display:flex; justify-content:space-between; margin-top:var(--sp-2);}

@media (max-width:980px){
  .metric-row{grid-template-columns:repeat(2,1fr);}
  .branch-grid{grid-template-columns:1fr;}
  .pos-shell{grid-template-columns:1fr; height:auto;}
}
</style>
</head>
