<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCore — Pharmacy ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --teal-900:#0A3830; --teal-800:#0F4C42; --teal-700:#156B5A; --teal-600:#1D8A72; --teal-100:#DCEEE8; --teal-50:#EFF7F4;
  --amber-800:#5C3D14; --amber-600:#9C6326; --amber-500:#C17F2B; --amber-100:#F5E3C8; --amber-50:#FAEFDC;
  --red-700:#8C2F26; --red-500:#C44536; --red-100:#F6DAD5;
  --paper:#FAF8F3; --paper-dim:#F1EDE3; --ink:#1F2420; --ink-soft:#5C6359; --ink-faint:#8C9389;
  --line:#E2DDD0; --line-strong:#CFC8B6;
  --white:#FFFFFF;
  --font-serif:'Source Serif 4', Georgia, serif;
  --font-sans:'Inter', -apple-system, sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
  --radius:10px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:var(--font-sans);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
#app{display:flex; min-height:100vh;}

/* ---------- Sidebar ---------- */
.sidebar{
  width:240px; background:var(--teal-900); color:var(--teal-100);
  display:flex; flex-direction:column; flex-shrink:0; position:sticky; top:0; height:100vh;
}
.brand{padding:28px 24px 20px; border-bottom:1px solid rgba(255,255,255,0.08);}
.brand-mark{
  width:34px; height:34px; border-radius:8px; background:var(--amber-500);
  display:flex; align-items:center; justify-content:center; margin-bottom:14px;
  font-family:var(--font-serif); font-weight:600; font-size:17px; color:var(--teal-900);
}
.brand-name{font-family:var(--font-serif); font-size:19px; font-weight:600; color:#fff; letter-spacing:0.2px;}
.brand-sub{font-size:11.5px; color:var(--teal-100); opacity:0.6; margin-top:3px; letter-spacing:0.4px; text-transform:uppercase;}

.branch-picker{padding:16px 18px; border-bottom:1px solid rgba(255,255,255,0.08);}
.branch-label{font-size:10.5px; text-transform:uppercase; letter-spacing:0.6px; opacity:0.55; margin-bottom:8px;}
.branch-select{
  width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
  color:#fff; padding:8px 10px; border-radius:7px; font-size:13.5px; font-family:var(--font-sans);
  cursor:pointer;
}
.branch-select option{color:#1F2420;}

.nav{flex:1; padding:14px 12px; overflow-y:auto;}
.nav-item{
  display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:8px;
  color:var(--teal-100); opacity:0.75; cursor:pointer; font-size:14px; margin-bottom:2px;
  transition:background 0.15s, opacity 0.15s;
}
.nav-item:hover{background:rgba(255,255,255,0.06); opacity:1;}
.nav-item.active{background:rgba(255,255,255,0.1); opacity:1; font-weight:500;}
.nav-item i{font-size:18px; width:18px; text-align:center;}
.nav-section-label{font-size:10.5px; text-transform:uppercase; letter-spacing:0.6px; opacity:0.4; padding:16px 12px 6px;}

.sidebar-foot{padding:16px 18px; border-top:1px solid rgba(255,255,255,0.08); font-size:12px; opacity:0.5;}

/* ---------- Main ---------- */
.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 36px; border-bottom:1px solid var(--line); background:var(--paper);
  position:sticky; top:0; z-index:5;
}
.page-title{font-family:var(--font-serif); font-size:25px; font-weight:600;}
.page-sub{font-size:13px; color:var(--ink-soft); margin-top:2px;}
.topbar-actions{display:flex; gap:10px; align-items:center;}
.btn{
  font-family:var(--font-sans); font-size:13.5px; font-weight:500; padding:9px 16px;
  border-radius:7px; border:1px solid var(--line-strong); background:var(--white);
  color:var(--ink); cursor:pointer; display:inline-flex; align-items:center; gap:7px;
  transition:background 0.15s, transform 0.1s;
}
.btn:hover{background:var(--paper-dim);}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--teal-800); color:#fff; border-color:var(--teal-800);}
.btn-primary:hover{background:var(--teal-700);}
.btn-sm{padding:6px 11px; font-size:12.5px;}

.content{padding:30px 36px 60px; flex:1;}

/* ---------- Cards & grids ---------- */
.metric-row{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px;}
.metric-card{
  background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
  padding:18px 20px;
}
.metric-label{font-size:12px; color:var(--ink-soft); margin-bottom:8px; display:flex; align-items:center; gap:6px;}
.metric-value{font-family:var(--font-mono); font-size:26px; font-weight:500; color:var(--ink);}
.metric-delta{font-size:12px; margin-top:6px; font-family:var(--font-mono);}
.metric-delta.up{color:var(--teal-700);}
.metric-delta.down{color:var(--red-500);}

.section-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px;}
.section-title{font-family:var(--font-serif); font-size:18px; font-weight:600;}
.section-link{font-size:13px; color:var(--teal-700); cursor:pointer;}

.card{background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:20px;}

.branch-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:30px;}
.branch-card{
  background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
  padding:18px 20px; cursor:pointer; transition:border-color 0.15s, transform 0.1s;
}
.branch-card:hover{border-color:var(--teal-600); transform:translateY(-1px);}
.branch-card-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;}
.branch-card-name{font-family:var(--font-serif); font-size:16.5px; font-weight:600;}
.branch-card-loc{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.status-pill{
  font-size:10.5px; padding:3px 9px; border-radius:20px; font-weight:500;
  text-transform:uppercase; letter-spacing:0.3px;
}
.status-good{background:var(--teal-50); color:var(--teal-800);}
.status-warn{background:var(--amber-50); color:var(--amber-800);}
.status-bad{background:var(--red-100); color:var(--red-700);}

.pulse-bar{display:flex; gap:2px; height:26px; align-items:flex-end; margin:10px 0 12px;}
.pulse-seg{flex:1; border-radius:2px 2px 0 0; background:var(--teal-100); transition:background 0.15s;}
.branch-stats{display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); font-family:var(--font-mono);}

/* ---------- Tables ---------- */
table{width:100%; border-collapse:collapse; font-size:13.5px;}
thead th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.4px;
  color:var(--ink-faint); padding:0 12px 10px; border-bottom:1px solid var(--line); font-weight:500;
}
tbody td{padding:13px 12px; border-bottom:1px solid var(--line); vertical-align:middle;}
tbody tr:hover{background:var(--paper-dim);}
tbody tr:last-child td{border-bottom:none;}
.mono{font-family:var(--font-mono); font-size:13px;}
.tname{font-weight:500;}
.tsub{font-size:12px; color:var(--ink-soft); margin-top:2px;}

.tag{font-size:11px; padding:3px 8px; border-radius:6px; font-weight:500; display:inline-flex; align-items:center; gap:4px;}
.tag-ok{background:var(--teal-50); color:var(--teal-800);}
.tag-low{background:var(--amber-50); color:var(--amber-800);}
.tag-out{background:var(--red-100); color:var(--red-700);}
.tag-exp{background:var(--red-100); color:var(--red-700);}

.avatar{
  width:32px; height:32px; border-radius:50%; background:var(--teal-100); color:var(--teal-800);
  display:inline-flex; align-items:center; justify-content:center; font-size:12.5px; font-weight:600;
  margin-right:10px; flex-shrink:0;
}
.person-cell{display:flex; align-items:center;}

.toolbar{display:flex; gap:10px; margin-bottom:16px; align-items:center;}
.search-input{
  flex:1; max-width:320px; padding:9px 14px; border:1px solid var(--line-strong); border-radius:7px;
  font-size:13.5px; font-family:var(--font-sans); background:var(--white);
}
.search-input:focus{outline:none; border-color:var(--teal-600);}
.filter-chip{
  padding:7px 13px; border:1px solid var(--line-strong); border-radius:20px; font-size:12.5px;
  background:var(--white); cursor:pointer; color:var(--ink-soft);
}
.filter-chip.active{background:var(--teal-800); color:#fff; border-color:var(--teal-800);}

/* ---------- AI Assistant ---------- */
.ai-shell{display:flex; flex-direction:column; height:calc(100vh - 150px); max-width:760px;}
.ai-msgs{flex:1; overflow-y:auto; padding:4px 0 20px; display:flex; flex-direction:column; gap:16px;}
.ai-msg{display:flex; gap:12px; max-width:88%;}
.ai-msg.user{align-self:flex-end; flex-direction:row-reverse;}
.ai-bubble{padding:12px 16px; border-radius:12px; font-size:14px; line-height:1.55;}
.ai-msg.assistant .ai-bubble{background:var(--white); border:1px solid var(--line);}
.ai-msg.user .ai-bubble{background:var(--teal-800); color:#fff;}
.ai-icon{
  width:30px; height:30px; border-radius:8px; background:var(--amber-500); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; color:var(--teal-900); font-size:15px;
}
.ai-suggestions{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px;}
.ai-chip{
  padding:8px 14px; border:1px solid var(--line-strong); border-radius:20px; font-size:12.5px;
  background:var(--white); cursor:pointer; transition:border-color 0.15s;
}
.ai-chip:hover{border-color:var(--teal-600); color:var(--teal-800);}
.ai-inputbar{display:flex; gap:10px; padding-top:14px; border-top:1px solid var(--line);}
.ai-input{flex:1; padding:12px 16px; border:1px solid var(--line-strong); border-radius:9px; font-size:14px;}
.ai-input:focus{outline:none; border-color:var(--teal-600);}
.ai-mini-table{margin-top:10px; border:1px solid var(--line); border-radius:8px; overflow:hidden;}
.ai-mini-table table{font-size:12.5px;}
.ai-mini-table thead th{padding:8px 10px; background:var(--paper-dim);}
.ai-mini-table tbody td{padding:8px 10px;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(15,30,26,0.45); display:none;
  align-items:center; justify-content:center; z-index:50;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--white); border-radius:14px; padding:28px 30px; width:440px; max-width:90vw;
  max-height:85vh; overflow-y:auto;
}
.modal-title{font-family:var(--font-serif); font-size:19px; font-weight:600; margin-bottom:18px;}
.field{margin-bottom:14px;}
.field label{display:block; font-size:12.5px; color:var(--ink-soft); margin-bottom:6px;}
.field input, .field select{
  width:100%; padding:9px 12px; border:1px solid var(--line-strong); border-radius:7px;
  font-size:13.5px; font-family:var(--font-sans);
}
.field input:focus, .field select:focus{outline:none; border-color:var(--teal-600);}
.modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:20px;}

.empty-state{text-align:center; padding:50px 20px; color:var(--ink-soft);}
.empty-state i{font-size:32px; opacity:0.4; margin-bottom:10px; display:block;}

.toast{
  position:fixed; bottom:24px; right:24px; background:var(--teal-900); color:#fff;
  padding:13px 20px; border-radius:9px; font-size:13.5px; display:flex; align-items:center; gap:10px;
  opacity:0; transform:translateY(10px); transition:opacity 0.2s, transform 0.2s; z-index:100;
}
.toast.show{opacity:1; transform:translateY(0);}

.badge-count{
  background:var(--amber-500); color:var(--teal-900); font-size:10.5px; font-weight:600;
  border-radius:10px; padding:1px 7px; margin-left:auto;
}

@media (max-width:980px){
  .metric-row{grid-template-columns:repeat(2,1fr);}
  .branch-grid{grid-template-columns:1fr;}
}

/* ---------- Landing / Login ---------- */
.gate{min-height:100vh; display:flex; flex-direction:column; background:var(--paper);}
.gate-nav{
  display:flex; align-items:center; justify-content:space-between;
  padding:22px 48px; max-width:1100px; width:100%; margin:0 auto;
}
.gate-brand{display:flex; align-items:center; gap:10px;}
.gate-brand-mark{
  width:32px; height:32px; border-radius:8px; background:var(--teal-800);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-serif);
  font-weight:600; font-size:16px; color:#fff;
}
.gate-brand-name{font-family:var(--font-serif); font-size:18px; font-weight:600;}
.gate-hero{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:40px 24px 80px; max-width:680px; margin:0 auto;
}
.gate-eyebrow{
  font-size:12px; letter-spacing:0.6px; text-transform:uppercase; color:var(--teal-700);
  font-weight:500; margin-bottom:18px; display:flex; align-items:center; gap:7px;
}
.gate-headline{
  font-family:var(--font-serif); font-size:42px; font-weight:600; line-height:1.18;
  margin-bottom:18px; letter-spacing:-0.3px;
}
.gate-sub{font-size:16px; color:var(--ink-soft); line-height:1.6; max-width:520px; margin-bottom:32px;}
.gate-cta-row{display:flex; gap:12px; margin-bottom:56px;}
.btn-lg{padding:13px 26px; font-size:14.5px; border-radius:8px;}
.gate-features{display:flex; gap:36px; flex-wrap:wrap; justify-content:center;}
.gate-feature{display:flex; align-items:center; gap:8px; font-size:13.5px; color:var(--ink-soft);}
.gate-feature i{color:var(--teal-700); font-size:17px;}
.gate-foot{text-align:center; padding:20px; font-size:12px; color:var(--ink-faint); border-top:1px solid var(--line);}

.login-shell{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:var(--paper); padding:24px;
}
.login-card{
  width:380px; background:var(--white); border:1px solid var(--line); border-radius:14px;
  padding:36px 32px;
}
.login-brand{display:flex; align-items:center; gap:10px; margin-bottom:28px;}
.login-title{font-family:var(--font-serif); font-size:21px; font-weight:600; margin-bottom:4px;}
.login-sub{font-size:13.5px; color:var(--ink-soft); margin-bottom:24px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block; font-size:12.5px; color:var(--ink-soft); margin-bottom:6px;}
.login-field input{
  width:100%; padding:10px 13px; border:1px solid var(--line-strong); border-radius:8px;
  font-size:14px; font-family:var(--font-sans);
}
.login-field input:focus{outline:none; border-color:var(--teal-600);}
.login-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; font-size:12.5px;}
.login-row a{color:var(--teal-700); text-decoration:none;}
.login-note{
  text-align:center; font-size:12px; color:var(--ink-faint); margin-top:18px;
  padding-top:16px; border-top:1px solid var(--line);
}
.login-back{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--ink-soft); cursor:pointer; margin-bottom:20px;}
.login-back:hover{color:var(--ink);}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/dist/tabler-icons.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
